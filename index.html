<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>旅行資金計算系統 · 終極視覺版</title>
<style>
/* ========== 全局樣式 & 高級粉紅系重構 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
:root {
  --bg-gradient: linear-gradient(135deg, #fff2f6 0%, #ffe5f0 100%);
  --surface: rgba(255, 243, 248, 0.85);
  --card-bg: rgba(255, 255, 255, 0.85);
  --card-shadow: 0 15px 30px -10px rgba(255, 75, 145, 0.15);
  --accent: #ff529a;
  --accent-light: #ff9ec4;
  --accent-dark: #c92263;
  --text-main: #3d202e;
  --text-soft: #85586f;
  --border-light: rgba(255, 82, 154, 0.2);
  --badge-active: #fff0f5;
  --badge-done: #e8f7ee;
  --green-done: #1e7d48;
  --radius-card: 24px;
  --radius-element: 16px;
}
body {
  background: var(--bg-gradient);
  font-family: system-ui, -apple-system, 'SF Pro Text', 'Noto Sans TC', sans-serif;
  color: var(--text-main);
  padding: 0 0 40px 0;
  line-height: 1.5;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
}
.hero {
  margin-bottom: 32px;
  text-align: center;
}
.hero h1 {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #e6397b, #961b4c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.hero .sub {
  color: var(--text-soft);
  margin-top: 8px;
  font-weight: 500;
  font-size: 1rem;
}

/* 雙欄響應式佈局 */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 24px;
  margin-bottom: 32px;
}
@media (max-width: 900px) {
  .dashboard-grid { grid-template-columns: 1fr; }
}

.card-panel {
  background: var(--surface);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-card);
  border: 1px solid var(--border-light);
  box-shadow: var(--card-shadow);
  padding: 24px;
}
.panel-title {
  font-weight: 700;
  font-size: 1.2rem;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-title span {
  background: rgba(255, 82, 154, 0.12);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  color: var(--accent-dark);
}

/* 表單元件 */
label {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-soft);
  margin-bottom: 6px;
  display: block;
}
input, select {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius-element);
  border: 1.5px solid rgba(255, 82, 154, 0.15);
  background: rgba(255, 255, 255, 0.9);
  font-size: 0.95rem;
  color: var(--text-main);
  outline: none;
  transition: all 0.2s;
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(255, 82, 154, 0.15);
  background: white;
}
.row-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 12px;
}

/* 按鈕樣式 */
.btn-group {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.btn {
  flex: 1;
  border: none;
  padding: 14px 20px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, #ff529a, #e62072);
  color: white;
  box-shadow: 0 4px 12px rgba(230, 32, 114, 0.2);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(230, 32, 114, 0.3);
}
.btn-danger {
  background: #ffebeb;
  border: 1px solid #ffccd5;
  color: #c93a4f;
}
.btn-danger:hover { background: #ffd6dd; }

/* 統計數字卡片 */
.stat-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.stat-card {
  background: rgba(255, 255, 255, 0.6);
  border-radius: var(--radius-element);
  padding: 16px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.5);
}
.stat-label { font-size: 0.75rem; font-weight: 700; color: var(--text-soft); margin-bottom: 4px;}
.stat-number { font-size: 1.4rem; font-weight: 800; color: var(--accent-dark); }

/* 資料視覺化區塊 */
.chart-container {
  background: rgba(255, 255, 255, 0.7);
  border-radius: var(--radius-element);
  padding: 16px;
  margin-top: 16px;
  border: 1px solid rgba(255, 82, 154, 0.1);
}
.chart-bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  gap: 10px;
}
.chart-label { width: 80px; font-size: 0.75rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chart-bar-wrapper { flex: 1; background: rgba(0,0,0,0.04); height: 16px; border-radius: 8px; overflow: hidden; }
.chart-bar { height: 100%; background: linear-gradient(90deg, #ff9ec4, #ff529a); width: 0%; transition: width 0.6s ease; }
.chart-value { width: 70px; font-size: 0.75rem; text-align: right; font-weight: 700; color: var(--accent-dark); }

/* 搜尋與清單控制 */
.list-controls {
  background: var(--surface);
  border-radius: var(--radius-card);
  padding: 20px;
  border: 1px solid var(--border-light);
  margin-bottom: 24px;
}
.filter-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.filter-item { flex: 1; min-width: 200px; }

/* 旅遊卡片清單 */
.cards-list { display: flex; flex-direction: column; gap: 16px; }
.trip-card {
  background: var(--card-bg);
  border-radius: var(--radius-card);
  border: 1px solid rgba(255, 82, 154, 0.12);
  padding: 20px;
  box-shadow: var(--card-shadow);
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.trip-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent-light);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.dest-name { font-size: 1.3rem; font-weight: 800; color: var(--text-main); }
.status-badge {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--badge-active);
  color: var(--accent-dark);
}
.status-badge.done { background: var(--badge-done); color: var(--green-done); }

/* 卡片內數據網格 */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.info-item { background: rgba(255, 82, 154, 0.04); border-radius: var(--radius-element); padding: 10px 14px; }
.info-label { font-size: 0.7rem; font-weight: 700; color: var(--text-soft); }
.info-value { font-weight: 800; font-size: 1.05rem; margin-top: 2px; }
.meta-time { font-size: 0.7rem; color: #b08ea0; margin-bottom: 12px; }

/* 卡片按鈕控制 */
.card-actions { display: flex; gap: 8px; justify-content: flex-end; }
.small-btn {
  background: white;
  border: 1px solid rgba(255, 82, 154, 0.2);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  color: var(--text-main);
  transition: all 0.15s;
}
.small-btn:hover { background: var(--badge-active); border-color: var(--accent); }
.small-btn-danger { color: #c93a4f; border-color: #ffccd5; }
.small-btn-danger:hover { background: #ffebeb; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  background: rgba(255, 255, 255, 0.4);
  border-radius: var(--radius-card);
  color: var(--text-soft);
  font-weight: 500;
}
.footer-tip {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-soft);
  margin-top: 40px;
  border-top: 1px dashed var(--border-light);
  padding-top: 20px;
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>✈️ 旅行資金計算系統</h1>
    <p class="sub">自動預算 · 數據視覺化 · 雲端 Sheet 同步 💗</p>
  </div>

  <div class="dashboard-grid">
    <div class="card-panel">
      <div class="panel-title">📝 新增旅行資金記錄 <span>安全前端驗證</span></div>
      <div>
        <label>目的地 *</label>
        <input type="text" id="destinationInput" placeholder="例：京都 / 巴黎 / 墾丁" maxlength="70" />
      </div>
      <div class="row-2col">
        <div>
          <label>天數 *</label>
          <input type="number" id="daysInput" min="1" placeholder="天數" />
        </div>
        <div>
          <label>每日預算 *</label>
          <input type="number" id="dailyCostInput" min="0" placeholder="每日花費 (當地幣)" />
        </div>
      </div>
      <div class="row-2col">
        <div>
          <label>額外花費 (可選)</label>
          <input type="number" id="extraCostInput" min="0" placeholder="額外支出" value="0" />
        </div>
        <div>
          <label>幣別顯示</label>
          <select id="currencySelect">
            <option value="TWD">TWD 新台幣</option>
            <option value="JPY">JPY 日圓</option>
            <option value="USD">USD 美金</option>
            <option value="EUR">EUR 歐元</option>
            <option value="HKD">HKD 港幣</option>
          </select>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="createBtn">✨ 新增並同步雲端</button>
        <button class="btn btn-danger" id="clearAllBtn">🗑 清除本地歷史</button>
      </div>
    </div>

    <div class="card-panel">
      <div class="panel-title">🔍 篩選總覽 & 預算視覺化 <span>即時連動</span></div>
      <div class="stat-cards">
        <div class="stat-card"><div class="stat-label">顯示筆數 / 總數</div><div class="stat-number" id="displayCount">0/0</div></div>
        <div class="stat-card"><div class="stat-label">顯示總預算</div><div class="stat-number" id="displayTotalBudget">0</div></div>
        <div class="stat-card"><div class="stat-label">進行中 (Active)</div><div class="stat-number" id="activeCount">0</div></div>
        <div class="stat-card"><div class="stat-label">已完成 (Done)</div><div class="stat-number" id="doneCount">0</div></div>
      </div>
      
      <div class="chart-container">
        <div class="stat-label" style="margin-bottom: 12px; text-align: left;">📊 前 4 筆預算對比圖</div>
        <div id="chartBody">
          <div style="font-size:0.75rem; color:var(--text-soft); text-align:center;">暫無可對比的數據</div>
        </div>
      </div>
    </div>
  </div>

  <div class="list-controls">
    <div class="filter-row">
      <div class="filter-item" style="flex: 1.5;">
        <label>🔎 搜尋目的地關鍵字</label>
        <input type="text" id="searchInput" placeholder="輸入關鍵字即時關鍵字過濾..." autocomplete="off" />
      </div>
      <div class="filter-item">
        <label>狀態過濾</label>
        <select id="statusFilter">
          <option value="all">顯示全部記錄</option>
          <option value="active">僅顯示：進行中 (Active)</option>
          <option value="done">僅顯示：已完成 (Done)</option>
        </select>
      </div>
      <div class="filter-item">
        <label>排序規則</label>
        <select id="sortSelect">
          <option value="createdDesc">📅 時間：最新優先</option>
          <option value="createdAsc">📅 時間：最舊優先</option>
          <option value="budgetDesc">💰 預算：從高到低</option>
          <option value="budgetAsc">💰 預算：從低到高</option>
        </select>
      </div>
    </div>
  </div>

  <div id="tripListContainer" class="cards-list">
    <div class="empty-state">正在加載並同步最新的雲端數據... 🌸</div>
  </div>

  <div class="footer-tip">
    💾 系統具備 LocalStorage 本地防斷線快取機制 · 支援 Status Toggle 自動異步回寫 Google Sheet 後端
  </div>
</div>

<script>
// 後端 APPS SCRIPT 連接網址
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyClxroFO9WqHCPMMPS4Gq4x6iTgM8st6hIM9BrkrcUInca1Zk547Y_HNB9Y2FticeZ/exec";
const STORAGE_KEY = "travel_records_system";

const clamp = (val) => (isNaN(val) || val < 0 ? 0 : Number(val));

// ------------------------------ Google Sheet 後端異步回寫核心 --------------------------
async function syncToSheet(payload) {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    console.log("雲端回寫成功:", payload.action);
  } catch (e) {
    console.error("同步到 Google Sheet 失敗:", e);
  }
}

async function fetchRecordsFromSheet() {
  const response = await fetch(APPS_SCRIPT_URL);
  const data = await response.json();
  if (data && data.ok && Array.isArray(data.records)) {
    return data.records.map(r => ({
      id: String(r["流水號 / ID"] || ""),
      createdAt: String(r["建立時間"] || new Date().toISOString()),
      status: String(r["狀態"] || "active"),
      destination: String(r["目的地"] || ""),
      days: Number(r["天數"] || 0),
      dailyCost: Number(r["每日預算"] || 0),
      extraCost: Number(r["額外花費"] || 0),
      totalBudget: Number(r["總預算"] || 0)
    }));
  }
  throw new Error("遠端解析失敗");
}

// ------------------------------ 輸入驗證與核心邏輯 --------------------------
function buildRecordFromInput() {
  const destination = document.getElementById("destinationInput").value.trim();
  const daysRaw = document.getElementById("daysInput").value;
  const dailyRaw = document.getElementById("dailyCostInput").value;
  const extraRaw = document.getElementById("extraCostInput").value;

  // 輸入驗證 (Validation)
  if (!destination) { alert("❌ 請輸入目的地！"); return null; }
  const days = parseInt(daysRaw);
  const dailyCost = parseFloat(dailyRaw);
  if (isNaN(days) || days <= 0) { alert("❌ 天數必須是正整數！"); return null; }
  if (isNaN(dailyCost) || dailyCost < 0) { alert("❌ 每日預算不能小於 0！"); return null; }
  
  const extraCost = extraRaw === "" ? 0 : (parseFloat(extraRaw) || 0);
  const totalBudget = (days * dailyCost) + clamp(extraCost);

  return {
    id: crypto.randomUUID ? crypto.randomUUID() : "id-" + Date.now() + "-" + Math.floor(Math.random() * 1000),
    createdAt: new Date().toISOString(),
    status: "active",
    destination, days, dailyCost, extraCost, totalBudget
  };
}

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveAllRecords(records) { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

// ------------------------------ UI 渲染、統計、資料視覺化 --------------------------
function refreshUI() {
  const allRecords = loadRecords();
  const statusFilter = document.getElementById("statusFilter").value;
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  const sortMode = document.getElementById("sortSelect").value;
  const currency = document.getElementById("currencySelect").value;

  // 1. 執行 Search 和 Filter
  let filtered = allRecords.filter(r => {
    const matchStatus = statusFilter === "all" || r.status === statusFilter;
    const matchKey = r.destination.toLowerCase().includes(keyword);
    return matchStatus && matchKey;
  });

  // 2. 執行排序
  if (sortMode === "createdDesc") filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  else if (sortMode === "createdAsc") filtered.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  else if (sortMode === "budgetDesc") filtered.sort((a,b) => b.totalBudget - a.totalBudget);
  else if (sortMode === "budgetAsc") filtered.sort((a,b) => a.totalBudget - b.totalBudget);

  // 3. 更新動態統計摘要
  document.getElementById("displayCount").innerText = `${filtered.length} / ${allRecords.length}`;
  document.getElementById("activeCount").innerText = allRecords.filter(r => r.status === "active").length;
  document.getElementById("doneCount").innerText = allRecords.filter(r => r.status === "done").length;
  
  const displayTotal = filtered.reduce((sum, r) => sum + r.totalBudget, 0);
  document.getElementById("displayTotalBudget").innerText = `${Math.round(displayTotal).toLocaleString()} ${currency}`;

  // 4. 資料視覺化渲染 (取前4個項目做動態長條圖對比)
  const chartBody = document.getElementById("chartBody");
  const chartItems = filtered.slice(0, 4);
  if (chartItems.length === 0) {
    chartBody.innerHTML = `<div style="font-size:0.75rem; color:var(--text-soft); text-align:center;">暫無可對比的數據</div>`;
  } else {
    const maxBudget = Math.max(...chartItems.map(item => item.totalBudget)) || 1;
    chartBody.innerHTML = chartItems.map(item => {
      const percentage = (item.totalBudget / maxBudget) * 100;
      return `
        <div class="chart-bar-row">
          <div class="chart-label">${item.destination}</div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar" style="width: ${percentage}%"></div>
          </div>
          <div class="chart-value">${Math.round(item.totalBudget).toLocaleString()}</div>
        </div>
      `;
    }).join("");
  }

  // 5. 渲染主要的卡片清單 (具備手機適配)
  const container = document.getElementById("tripListContainer");
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">🌸 沒有符合篩選條件的旅行記錄 🌸</div>`;
    return;
  }

  container.innerHTML = filtered.map(r => `
    <div class="trip-card">
      <div class="card-header">
        <div class="dest-name">${r.destination}</div>
        <div class="status-badge ${r.status === "done" ? "done" : ""}">${r.status === "done" ? "✅ 已完成" : "✈️ 進行中"}</div>
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">📅 天數</div><div class="info-value">${r.days} 天</div></div>
        <div class="info-item"><div class="info-label">💸 每日預算</div><div class="info-value">${Math.round(r.dailyCost).toLocaleString()} ${currency}</div></div>
        <div class="info-item"><div class="info-label">➕ 額外花費</div><div class="info-value">${Math.round(r.extraCost).toLocaleString()} ${currency}</div></div>
        <div class="info-item"><div class="info-label">💰 總預算</div><div class="info-value" style="color:var(--accent-dark)"><strong>${Math.round(r.totalBudget).toLocaleString()} ${currency}</strong></div></div>
      </div>
      <div class="meta-time">🕒 建立時間：${formatDate(r.createdAt)}</div>
      <div class="card-actions">
        <button class="small-btn" onclick="toggleStatus('${r.id}')">${r.status === "done" ? "↻ 恢復 Active" : "✓ 標記 Done"}</button>
        <button class="small-btn small-btn-danger" onclick="deleteRecord('${r.id}')">🗑 刪除</button>
      </div>
    </div>
  `).join("");
}

function formatDate(isoStr) {
  if (!isoStr) return "未知";
  const d = new Date(isoStr);
  return isNaN(d.getTime()) ? isoStr : `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ------------------------------ 互動事件 (含 Sheet 同步回寫) --------------------------
window.toggleStatus = function(id) {
  const records = loadRecords();
  const target = records.find(r => r.id === id);
  if (target) {
    const newStatus = target.status === "active" ? "done" : "active";
    target.status = newStatus;
    saveAllRecords(records);
    refreshUI();
    
    // Status Toggle 回寫 Sheet
    syncToSheet({ action: "update", id: id, changes: { status: newStatus } });
  }
}

window.deleteRecord = function(id) {
  if (confirm("確定刪除此筆記錄嗎？")) {
    const records = loadRecords().filter(r => r.id !== id);
    saveAllRecords(records);
    refreshUI();
    // 可選：若後端支援刪除，可在此處調用 syncToSheet({ action: "delete", id: id });
  }
}

document.getElementById("createBtn").addEventListener("click", () => {
  const newRecord = buildRecordFromInput();
  if (newRecord) {
    const records = loadRecords();
    records.unshift(newRecord);
    saveAllRecords(records);
    
    // 清空輸入欄位
    document.getElementById("destinationInput").value = "";
    document.getElementById("daysInput").value = "";
    document.getElementById("dailyCostInput").value = "";
    document.getElementById("extraCostInput").value = "0";
    
    refreshUI();
    // 新增時非同步回寫 Sheet
    syncToSheet({ action: "create", record: newRecord });
  }
});

document.getElementById("clearAllBtn").addEventListener("click", () => {
  if (confirm("⚠️ 確認清除本地快取？這不會刪除雲端 Sheet 上的原創數據。")) {
    localStorage.removeItem(STORAGE_KEY);
    refreshUI();
  }
});

// 監聽所有控制元件，達成即時過濾、排序與搜尋
["statusFilter", "sortSelect", "currencySelect"].forEach(id => {
  document.getElementById(id).addEventListener("change", refreshUI);
});
document.getElementById("searchInput").addEventListener("input", refreshUI);

// 初始化網頁：優先拉取雲端數據
async function init() {
  refreshUI(); // 先顯示本地快取
  try {
    const remoteRecords = await fetchRecordsFromSheet();
    saveAllRecords(remoteRecords); // 成功拉取後更新快取
    refreshUI();
  } catch (err) {
    console.warn("無法連接 Google Sheet，目前正使用 LocalStorage 本地歷史紀錄運作:", err);
  }
}

window.addEventListener("DOMContentLoaded", init);
</script>
